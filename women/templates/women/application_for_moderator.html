<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Заявка на модератора — EasyBook</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary: #4f46e5;
    --primary-dark: #4338ca;
    --bg: #f9fafb;
    --text: #111827;
    --muted: #6b7280;
    --card: #ffffff;
    --border: #e5e7eb;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
}

header{
    background:white;
    border-bottom:1px solid var(--border);
    padding:16px 40px;
}

.logo{
    font-size:22px;
    font-weight:700;
    color:var(--primary);
}

.container{
    max-width:700px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:25px;
    box-shadow:0 2px 6px rgba(0,0,0,0.03);
}

.title{
    font-size:20px;
    font-weight:600;
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    font-size:14px;
    margin-bottom:5px;
    color:var(--muted);
}

input, textarea{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:8px;
    font-size:14px;
}

textarea{
    resize:vertical;
    min-height:90px;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:var(--primary-dark);
}
</style>
</head>

<body>

<header>
    <div class="logo">EasyBook</div>
</header>

<div class="container">

    <div class="card">
        <div class="title">Заявка на модератора</div>

        <form method="POST" action="{% url 'moderator_application' %}">
            {% csrf_token %}

            <div class="form-group">
                <label>Имя / ник</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Возраст</label>
                <input type="number" name="age" required>
            </div>

            <div class="form-group">
                <label>Опыт модерации</label>
                <textarea name="experience"></textarea>
            </div>

            <div class="form-group">
                <label>Почему хотите стать модератором?</label>
                <textarea name="reason" required></textarea>
            </div>

            <div class="form-group">
                <label>Как будете рассматривать жалобы?</label>
                <textarea name="process" required></textarea>
            </div>

            <div class="form-group">
                <label>Что сделаете при серьёзном нарушении?</label>
                <textarea name="violation" required></textarea>
            </div>

            <button type="submit">Отправить заявку</button>
        </form>
    </div>

</div>

</body>
</html>
