<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Портфолио</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary: #4f46e5;
    --primary-dark: #4338ca;
    --bg: #f3f4f6;
    --card: #ffffff;
    --border: #e5e7eb;
    --muted: #6b7280;
}

* {
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #eef2ff, #f3f4f6);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 20px;
}

.wrapper {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
    max-width: 800px;
}

.card {
    background: var(--card);
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

.card h2 {
    margin-bottom: 15px;
}

.card p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 20px;
}

/* Buttons */
button {
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    background: var(--primary);
    color: white;
    cursor: pointer;
    font-weight: 500;
    transition: 0.3s;
}

button:hover {
    background: var(--primary-dark);
}

/* Portfolio list */
.project-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.project-item {
    background: #f9fafb;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid var(--border);
    text-align: center;
}

/* Modal (пустышка) */
.modal {
    display: none; /* скрыто */
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: var(--card);
    padding: 25px;
    border-radius: 18px;
    max-width: 400px;
    width: 100%;
    position: relative;
}

.modal-content input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid var(--border);
}

.modal-content button {
    width: 100%;
}

/* Close button */
.close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: transparent;
    color: var(--muted);
    font-size: 20px;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h2>Портфолио</h2>
        <p>Здесь отображаются ваши проекты</p>

        <form method="GET" action="{% url 'price_per_project' %}">
            <input type="text" name="salary" placeholder="10$-100$">
            <button type="submit" >цена за проект</button>
        </form>

        <form method="POST" action="{% url 'add_page' %}">
            {% csrf_token %}
        <button>+ Добавить проект</button>
        </form>
        <div class="project-list">
            <!-- Примеры проектов -->
            <form method="POST" action="{% url 'project_1' %}">
                {% csrf_token %}
            <button type="submit" >Проект 1</div>
            </form>

            <form method="POST"  action="{% url 'project_2' %}">
                {% csrf_token %}
            <button type="submit" >Проект 2</div>
            </form>
        </div>
    </div>
</div>



</body>
</html>
