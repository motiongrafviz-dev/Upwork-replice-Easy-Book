<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Оплата — EasyBook</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary: #4f46e5;
    --primary-dark: #4338ca;
    --bg: #f9fafb;
    --text: #111827;
    --muted: #6b7280;
    --card: #ffffff;
    --border: #e5e7eb;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
}

body {
    background: var(--bg);
    color: var(--text);
}

header{
    background:white;
    border-bottom:1px solid var(--border);
    padding:16px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:22px;
    font-weight:700;
    color:var(--primary);
}

/* CONTAINER */
.container{
    max-width:700px;
    margin:40px auto;
    background:var(--card);
    padding:30px;
    border-radius:12px;
    border:1px solid var(--border);
}

/* TITLE */
h2{
    margin-bottom:20px;
}

/* INPUTS */
.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
}

input, select{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:8px;
    outline:none;
}

/* BUTTON */
.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:var(--primary);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:var(--primary-dark);
}

/* SUMMARY */
.summary{
    background:#f3f4f6;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.summary div{
    display:flex;
    justify-content:space-between;
    margin-bottom:5px;
}
</style>
</head>

<body>

<header>
    <div class="logo">EasyBook</div>
</header>

<div class="container">

<h2>Оплата услуг фрилансера</h2>

<div class="summary">
    <div>
        <span>Фрилансер:</span>
        <h1>{{ acount_info.username_org.0 }}</h1>
    </div>
    <div>
        <span>Услуга:</span>
        <span>Создание проекта</span>
    </div>
    <div>
        <span>Цена:</span>
        <strong>{{ acount_info.salary}}</strong>
    </div>
</div>

<form method="POST", action="{% url 'paying_system' %}">
     {% csrf_token %}
    <div class="form-group">
        <label>Имя фрилансера</label>
        <input name="freelancer_name" type="text" placeholder="">
    </div>

    <div class="form-group">
        <label>Номер карты</label>
        <input name="card_number" type="text" placeholder="1234 5678 9012 3456">
    </div>



    <button class="btn">Оплатить</button>
</form>

</div>

</body>
</html>
