<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Добавить проект — EasyBook</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --primary: #4f46e5;
    --primary-dark: #4338ca;
    --bg: #f3f4f6;
    --card: #ffffff;
    --border: #e5e7eb;
    --muted: #6b7280;
}

* {
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #eef2ff, #f3f4f6);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.wrapper {
    width: 100%;
    max-width: 600px;
}

.card {
    background: var(--card);
    padding: 35px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

.card h2 {
    margin-bottom: 8px;
}

.card p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 20px;
}

/* Inputs */
input, textarea {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 15px;
    transition: 0.2s;
}

input:focus, textarea:focus {
    border-color: var(--primary);
    outline: none;
}

/* Большое поле */
textarea {
    height: 250px;
    width:300px;
    resize: vertical;
    font-family: monospace;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: var(--primary);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: var(--primary-dark);
}
</style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h2>Добавить проект</h2>
        <p>Вставьте код вашего проекта</p>

        <form method="POST" action="{% url 'add_page' %}">
            {% csrf_token %}

            <input type="text" name="title" placeholder="Название проекта" required>

            <textarea name="code"
                      placeholder="Вставьте сюда код проекта..."
                      required></textarea>

            <button type="submit">Сохранить проект</button>
        </form>

    </div>
</div>

</body>
</html>
